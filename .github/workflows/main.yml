name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7

    - name: Decode Keystore
      if: github.event_name != 'pull_request'
      shell: python
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        import base64
        import os
        
        keystore_b64 = os.environ.get('KEYSTORE_BASE64', '')
        # Temizlik: Boşlukları ve satır sonlarını temizle
        keystore_b64 = "".join(keystore_b64.split())
        
        try:
            keystore_bytes = base64.b64decode(keystore_b64, validate=True)
            with open('android/app/release.keystore', 'wb') as f:
                f.write(keystore_bytes)
            print("Keystore başarıyla çözüldü ve kaydedildi.")
        except Exception as e:
            print(f"Hata: Keystore çözülemedi. Lütfen KEYSTORE_BASE64 verisini kontrol edin. {e}")
            exit(1)

    - name: Build Release APK
      if: github.event_name != 'pull_request'
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        gradle assembleRelease

    - name: Build Debug APK
      if: github.event_name == 'pull_request'
      run: |
        cd android
        gradle assembleDebug

    - name: Upload Release APK
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Upload Debug APK
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
